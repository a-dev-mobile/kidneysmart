name: Flutter CI/CD

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v2
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - run: flutter --version

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk

    - name: Find APK File
      id: find-apk
      run: |
        apk_path=$(find ./build/app/outputs/apk/release -name '*.apk' | head -n 1)
        echo "APK_PATH=$apk_path" >> $GITHUB_ENV
        echo "::set-output name=apk_path::$apk_path"
        echo "Found APK at $apk_path"

    - name: Send APK
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Sending APK..."
        response=$(curl --write-out "%{http_code}" --silent --output /dev/null --request POST \
                 --url ${{ secrets.API_ENDPOINT }} \
                 --header 'Content-Type: multipart/form-data' \
                 --form "file=@${{ env.APK_PATH }}")
        echo "Response code: $response"
        if [ "$response" -ne 200 ]; then
          echo "Error: Failed to send APK. Response code: $response"
          exit 1
        else
          echo "APK sent successfully."
