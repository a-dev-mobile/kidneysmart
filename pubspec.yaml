name: nutrition
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <3.0.0"
  flutter: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # SDK extensions
  # flutter_localizations from sdk depends on meta 1.8.0
  meta: ^1.8.0
  # flutter_localizations from sdk depends on collection 1.16.0
  collection: ^1.16.0
  async: ^2.10.0

  # Stream
  # stream_transform: ^2.1.0
  # rxdart: ^0.27.7
  # System
  path_provider: ^2.0.13
  # flutter_localizations from sdk depends on path 1.8.2
  path: ^1.8.2
  platform_info: ^3.2.0
  device_info_plus: ^8.1.0
  package_info_plus: ^3.0.3
  connectivity_plus: ^3.0.3

  # Data manipulation
  # stream_transform: ^2.1.0



  # Helper 
  equatable: ^2.0.5


  # di/state
  flutter_riverpod: ^2.3.2
  

  
  # Code generation
  freezed_annotation: ^2.2.0
  json_annotation: ^4.8.0

  # Internationalization
  intl: ^0.17.0
  flutter_localizations:
    sdk: flutter

  # Logging
  logger: ^1.3.0
  shared_preferences: ^2.0.20
  # sqflite_sqlcipher: ^2.1.1+1

  # HTTP
  dio: ^5.1.0
  dio_log:
    git:
         url: https://github.com/flutterplugin/dio_log.git
         ref: dependabot/pub/dio-5.0.3

  # Navigation
  go_router: ^6.5.1

  # Native
  url_launcher: ^6.1.10
  share_plus: ^6.3.1

  # Helper for UI
  # flash: ^2.0.5
  lottie: ^2.3.1
  flutter_native_splash: ^2.2.19
  flutter_svg: ^2.0.4
  flex_color_scheme: ^7.0.0-dev.3
  flutter_markdown: ^0.6.14
  webview_flutter: ^4.0.7
  introduction_screen: ^3.1.7
  # syncfusion_flutter_pdfviewer: ^20.4.44
  # syncfusion_flutter_charts: ^20.4.44
  # syncfusion_flutter_calendar: ^20.4.44
  google_fonts: ^4.0.3
  flutter_typeahead: ^4.3.7
  # TEST
  device_preview: ^1.1.0
  feedback: ^2.6.0
  flutter_inappwebview: ^5.7.2+3
  # firebase
  firebase_core: ^2.8.0
  firebase_crashlytics: ^3.0.17
  firebase_remote_config: ^3.0.15
  cloud_firestore: ^4.4.5
  firebase_analytics: ^10.1.6
  firebase_performance: ^0.9.0+16
  firebase_storage: ^11.0.16
  firebase_database: ^10.0.16
  universal_io: ^2.2.0

  # ******************************
  #  local packages
  # ******************************



dev_dependencies:
  # Analyzer extensions
  dart_code_metrics: ^5.7.0
  very_good_analysis: ^4.0.0+1

  # Code generation
  freezed: ^2.3.2
  build_runner: ^2.3.3
  json_serializable: ^6.6.1
  turn_gen:
    path: F:/DEV/FLUTTER/project/MY_GITHUB/turn_gen
  # turn_gen: ^0.8.2





flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/svg/
    - assets/lottie/
    - assets/image/
    - assets/icons/

  fonts:
    - family: app_icons
      fonts:
        - asset: assets/icons/app_icons.ttf
