name: nutrition
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <3.0.0"
  flutter: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # SDK extensions
  # flutter_localizations from sdk depends on meta 1.8.0
  meta: ^1.8.0
  # flutter_localizations from sdk depends on collection 1.16.0
  collection: ^1.17.0
  async: ^2.10.0

  # System
  path_provider: ^2.0.14
  # flutter_localizations from sdk depends on path 1.8.2
  path: ^1.8.2
  platform_info: ^3.2.0
  device_info_plus: ^8.2.2
  package_info_plus: ^3.1.2
  connectivity_plus: ^3.0.6

  # Data manipulation
  # di/state
  flutter_riverpod: ^2.3.6
  
  # Internationalization
  intl: ^0.17.0
  flutter_localizations:
    sdk: flutter

  # Logging
  logger: ^1.3.0
  shared_preferences: ^2.1.0
  # sqflite_sqlcipher: ^2.1.1+1


  # HTTP
  dio: ^5.1.1
  dio_log:
    git:
         url: https://github.com/flutterplugin/dio_log.git
         ref: dependabot/pub/dio-5.0.3

  # Navigation
  go_router: ^7.0.0

  # Native
  url_launcher: ^6.1.10
  share_plus: ^6.3.4

  # Helper for UI
  flutter_typeahead: ^4.3.8
  flash: ^3.0.3+5
  lottie: ^2.3.2
  flutter_native_splash: ^2.2.19
  flutter_svg: ^2.0.5
  flex_color_scheme: ^7.0.5
  flutter_markdown: ^0.6.14
  webview_flutter: ^4.2.0
  introduction_screen: ^3.1.8
  google_fonts: ^4.0.4

  # TEST
  device_preview: ^1.1.0
  feedback: ^2.6.0

  # firebase
  firebase_core: ^2.11.0
  firebase_crashlytics: ^3.2.0
  firebase_analytics: ^10.3.0




# database
  sqflite: ^2.2.8+1




  # ******************************
  #  local packages
  # ******************************



dev_dependencies:
  # Analyzer extensions
  dart_code_metrics: ^5.7.2
  very_good_analysis: ^4.0.0+1

  # turn_gen:
    # path: F:/DEV/FLUTTER/project/MY_GITHUB/turn_gen
  turn_gen: ^0.8.9


turn_gen:
  assets_output: "lib/gen/"
  # show_method_comments: true
  folder_barrel: lib\core, 


flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/svg/
    - assets/lottie/
    - assets/image/
    - assets/icons/
    - assets/db/

  fonts:
    - family: app_icons
      fonts:
        - asset: assets/icons/app_icons.ttf
